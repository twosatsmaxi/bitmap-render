<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; connect-src 'self' http://localhost:3000 https://mempool.space; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<title>Bitcoin Block Viewer Lite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; background:#0d1117; font-family:'Courier New',monospace; color:#fff; }
  body { padding: 24px; }
  #toolbar {
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px;
  }
  #title { font-size:14px; letter-spacing:0.08em; text-transform:uppercase; color:#f7a23b; }
  #search-form {
    display:flex; align-items:center; gap:0; flex:1; min-width:280px; max-width:540px;
  }
  #search-input {
    flex:1; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
    border-right:none; border-radius:4px 0 0 4px; color:#fff; font-family:'Courier New',monospace;
    font-size:13px; padding:8px 12px; outline:none;
  }
  #search-btn, .step-btn {
    background:rgba(247,162,59,0.18); border:1px solid rgba(247,162,59,0.45); color:#f7a23b;
    font-family:'Courier New',monospace; font-size:13px; padding:8px 14px; cursor:pointer;
  }
  #search-btn { border-radius:0 4px 4px 0; }
  .step-btn { border-radius:4px; }
  #status { color:rgba(255,255,255,0.55); font-size:12px; min-height:16px; }
  #grid {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:18px;
  }
  .card {
    background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
    border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px;
  }
  .card-head {
    display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:10px;
    font-size:12px; color:rgba(255,255,255,0.78);
  }
  .card-head .height { color:#f7a23b; }
  .canvas-wrap {
    position:relative; width:100%; aspect-ratio:1 / 1; background:#090c11; border-radius:8px; overflow:hidden;
  }
  canvas { width:100%; height:100%; display:block; }
  .loading {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.35); font-size:12px;
  }
  #tooltip {
    position:fixed; background:rgba(13,17,23,0.96); border:1px solid rgba(247,162,59,0.35);
    color:#fff; font-size:11px; padding:8px 10px; border-radius:4px; pointer-events:none; display:none; z-index:100;
  }
  #tooltip .tid { color:#f7a23b; }
  @media (max-width: 720px) {
    body { padding: 16px; }
    #toolbar { align-items:stretch; }
    #search-form { max-width:none; }
  }
</style>
</head>
<body>
<div id="toolbar">
  <div id="title">Lite Block Grid</div>
  <button class="step-btn" id="prev-btn" type="button">-4</button>
  <button class="step-btn" id="next-btn" type="button">+4</button>
  <form id="search-form">
    <input id="search-input" type="text" placeholder="start block height" autocomplete="off" spellcheck="false">
    <button id="search-btn" type="submit">Load</button>
  </form>
</div>
<div id="status"></div>
<div id="grid"></div>
<div id="tooltip"></div>

<script>
const _liteParams = new URLSearchParams(location.search);
const _raw_api_base = _liteParams.get('api_base') || 'http://localhost:3000';
const _raw_mempool_base = _liteParams.get('mempool_base') || 'https://mempool.space';

// Simple URL validation to prevent XSS/injection via URL parameters
function _sanitizeUrl(u) {
  try {
    const url = new URL(u);
    if (url.protocol !== 'http:' && url.protocol !== 'https:') return null;
    return url.origin;
  } catch(e) { return null; }
}

const API_BASE = _sanitizeUrl(_raw_api_base) || 'http://localhost:3000';
const MEMPOOL_BASE = _sanitizeUrl(_raw_mempool_base) || 'https://mempool.space';

const GRID_COUNT = 4;
const tooltip = document.getElementById('tooltip');
const statusEl = document.getElementById('status');
const gridEl = document.getElementById('grid');
let startHeight = 261250;
let cards = [];

// HCL color (used for non-OffscreenCanvas fallback rendering on main thread)
function hclToRgb(hDeg, c, l) {
  const h = hDeg * Math.PI / 180;
  const a = Math.cos(h) * c, b = Math.sin(h) * c;
  const fy = (l + 16) / 116, fx = a / 500 + fy, fz = fy - b / 200;
  const e = 0.008856, k = 903.3;
  const X = (fx*fx*fx > e ? fx*fx*fx : (116*fx-16)/k) * 0.95047;
  const Y = l > k*e ? Math.pow((l+16)/116, 3) : l/k;
  const Z = (fz*fz*fz > e ? fz*fz*fz : (116*fz-16)/k) * 1.08883;
  const lin = v => v <= 0.0031308 ? 12.92*v : 1.055*Math.pow(v, 1/2.4) - 0.055;
  return [
    Math.max(0, Math.min(255, Math.round(lin(X*3.2406 + Y*-1.5372 + Z*-0.4986) * 255))),
    Math.max(0, Math.min(255, Math.round(lin(X*-0.9689 + Y*1.8758 + Z*0.0415) * 255))),
    Math.max(0, Math.min(255, Math.round(lin(X*0.0557 + Y*-0.2040 + Z*1.0570) * 255)))
  ];
}
const C = 78.225;
const ORANGE = { h: 0.181, l: 0.472 };
const TX_COLOR = (() => { const [r,g,b] = hclToRgb(ORANGE.h*360, C, ORANGE.l*150); return `rgb(${r},${g},${b})`; })();

// Build a 2D index map from squares for O(1) hover hit-detection.
// Returns map[y][x] = tx index (number), or null.
function buildTxMap(squares, width, usedHeight) {
  const map = [];
  for (const sq of squares) {
    for (let dy = 0; dy < sq.r; dy++) {
      const ry = sq.y + dy;
      if (!map[ry]) map[ry] = new Array(width).fill(null);
      for (let dx = 0; dx < sq.r; dx++) map[ry][sq.x + dx] = sq.index;
    }
  }
  return map;
}

// Render squares onto a regular canvas (non-OffscreenCanvas path).
function renderFromSquares(state) {
  if (!state.squares) return;
  const side = state.canvas.clientWidth || 240;
  if (!state.ctx) state.ctx = state.canvas.getContext('2d');
  state.canvas.width = side;
  state.canvas.height = side;
  state.canvasSize = side;
  const draw = Math.max(state.layoutWidth, state.usedHeight);
  state.gridSize = side / draw;
  state.offsetY = (side - state.usedHeight * state.gridSize) / 2;
  const unitPadding = state.gridSize / 4;
  state.ctx.fillStyle = '#0d1117';
  state.ctx.fillRect(0, 0, side, side);
  state.ctx.fillStyle = TX_COLOR;
  for (const sq of state.squares) {
    const px = sq.x * state.gridSize + unitPadding;
    const py = sq.y * state.gridSize + state.offsetY + unitPadding;
    const pw = sq.r * state.gridSize - unitPadding * 2;
    if (pw <= 0) continue;
    state.ctx.fillRect(px, py, pw, pw);
  }
}

async function fetchBinaryTxs(height) {
  const response = await fetch(`${API_BASE}/api/block/${height}`);
  if (!response.ok) throw new Error(`Failed to load block ${height}`);
  const hash = response.headers.get('X-Block-Hash');
  const buffer = await response.arrayBuffer();
  return { hash, buffer };
}

function buildCard(height) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <div class="height">#${height.toLocaleString()}</div>
      <div class="meta">loading</div>
    </div>
    <div class="canvas-wrap">
      <canvas></canvas>
      <div class="loading">Loading…</div>
    </div>`;
  const canvas = card.querySelector('canvas');
  const loading = card.querySelector('.loading');
  const meta = card.querySelector('.meta');
  // ctx is lazily created in renderFromSquares to allow transferControlToOffscreen
  const state = {
    height, card, canvas, ctx: null, loading, meta,
    worker: null, hasOffscreen: false,
    txMap: null, squares: null,
    layoutWidth: 1, usedHeight: 0,
    canvasSize: 1, gridSize: 1, offsetY: 0,
    hash: null, txidsPromise: null,
  };

  canvas.addEventListener('mousemove', async e => {
    if (!state.txMap) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (state.canvasSize / rect.width);
    const my = (e.clientY - rect.top) * (state.canvasSize / rect.height);
    const gx = Math.floor(mx / state.gridSize);
    const gy = Math.floor((my - state.offsetY) / state.gridSize);
    const row = state.txMap[gy];
    const foundIdx = row != null ? row[gx] : undefined;
    if (foundIdx !== null && foundIdx !== undefined) {
      tooltip.style.cssText = `display:block;left:${e.clientX + 14}px;top:${e.clientY - 8}px`;
      if (!state.txidsPromise && state.hash) {
        state.txidsPromise = fetch(`${MEMPOOL_BASE}/api/block/${state.hash}/txids`).then(r => r.json());
      }
      const txids = state.txidsPromise ? await state.txidsPromise : null;
      const txid = txids ? txids[foundIdx] : null;

      tooltip.textContent = '';
      const tidEl = document.createElement('div');
      tidEl.className = 'tid';
      tidEl.textContent = txid 
        ? `${txid.slice(0, 20)}…${txid.slice(-8)}`
        : `tx #${foundIdx}`;
      tooltip.appendChild(tidEl);
    } else {
      tooltip.style.display = 'none';
    }
  });
  canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  return state;
}

function loadCard(state) {
  return new Promise(async (resolve, reject) => {
    try {
      const { hash, buffer } = await fetchBinaryTxs(state.height);
      state.hash = hash;

      const worker = new Worker('./worker.js');
      state.worker = worker;

      const side = state.canvas.clientWidth || 240;
      const transferables = [buffer];
      let offscreenCanvas = null;

      if (typeof state.canvas.transferControlToOffscreen === 'function') {
        try {
          offscreenCanvas = state.canvas.transferControlToOffscreen();
          transferables.push(offscreenCanvas);
          state.hasOffscreen = true;
          state.canvasSize = side;
        } catch (_) { offscreenCanvas = null; }
      }

      worker.postMessage(
        { type: 'layout', buffer, canvasSize: side, offscreenCanvas },
        transferables
      );

      worker.onmessage = (e) => {
        const { txCount, squares, layoutWidth, usedHeight } = e.data;
        state.squares = squares;
        state.layoutWidth = layoutWidth;
        state.usedHeight = usedHeight;
        state.txMap = buildTxMap(squares, layoutWidth, usedHeight);

        const draw = Math.max(layoutWidth, usedHeight);
        state.gridSize = side / draw;
        state.offsetY = (side - usedHeight * state.gridSize) / 2;

        state.meta.textContent = `${txCount.toLocaleString()} tx`;
        state.loading.style.display = 'none';

        if (!state.hasOffscreen) renderFromSquares(state);

        resolve();
      };

      worker.onerror = (err) => {
        worker.terminate();
        state.worker = null;
        reject(err);
      };
    } catch (err) {
      reject(err);
    }
  });
}

async function loadGrid(height) {
  cards.forEach(card => { if (card.worker) { card.worker.terminate(); card.worker = null; } });
  startHeight = height;
  document.getElementById('search-input').value = String(height);
  statusEl.textContent = `Loading blocks ${height.toLocaleString()}-${(height + GRID_COUNT - 1).toLocaleString()}…`;
  gridEl.innerHTML = '';
  cards = Array.from({ length: GRID_COUNT }, (_, i) => buildCard(height + i));
  cards.forEach(card => gridEl.appendChild(card.card));
  const results = await Promise.allSettled(cards.map(loadCard));
  const failures = results.filter(r => r.status === 'rejected').length;
  statusEl.textContent = failures
    ? `Loaded ${GRID_COUNT - failures}/${GRID_COUNT} blocks`
    : `Loaded blocks ${height.toLocaleString()}-${(height + GRID_COUNT - 1).toLocaleString()}`;
  cards.forEach((card, i) => {
    if (results[i].status === 'rejected') {
      card.loading.textContent = 'Error';
      card.meta.textContent = 'failed';
    }
  });
}

document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  const value = parseInt(document.getElementById('search-input').value, 10);
  if (Number.isFinite(value)) loadGrid(value);
});
document.getElementById('prev-btn').addEventListener('click', () => loadGrid(Math.max(0, startHeight - GRID_COUNT)));
document.getElementById('next-btn').addEventListener('click', () => loadGrid(startHeight + GRID_COUNT));
window.addEventListener('resize', () => {
  cards.forEach(card => {
    if (!card.squares) return;
    if (card.hasOffscreen && card.worker) {
      const side = card.canvas.clientWidth || 240;
      card.canvasSize = side;
      const draw = Math.max(card.layoutWidth, card.usedHeight);
      card.gridSize = side / draw;
      card.offsetY = (side - card.usedHeight * card.gridSize) / 2;
      card.worker.postMessage({ type: 'resize', canvasSize: side });
    } else if (!card.hasOffscreen) {
      renderFromSquares(card);
    }
  });
});

loadGrid(startHeight);
</script>
</body>
</html>
