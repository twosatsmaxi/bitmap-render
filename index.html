<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:3000 https://mempool.space; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<title>Bitcoin Block Viewer — Bitmap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width:100%; height:100%; background:#0d1117; font-family:'Courier New',monospace; color:#fff; overflow:hidden; }
  #app { display:flex; width:100vw; height:100vh; align-items:center; justify-content:center; }
  #block-wrap { display:flex; align-items:center; position:relative; }
  #panel {
    width:190px; flex-shrink:0; padding-right:24px;
    text-align:right; font-size:13px; line-height:1.65; color:#fff;
  }
  #panel b { font-size:15px; }
  #panel .btc { color:#f7a23b; }
  #canvas-wrap { position:relative; flex-shrink:0; }
  canvas { display:block; }
  #close-btn {
    position:absolute; top:-8px; right:-44px;
    width:30px; height:30px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.55); background:transparent;
    color:#fff; font-size:14px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #prev-btn, #next-btn {
    position:fixed; top:50%; transform:translateY(-50%);
    background:transparent; border:none; color:rgba(255,255,255,0.6);
    font-size:30px; cursor:pointer; z-index:10;
    width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  }
  #prev-btn { left:8px; }
  #next-btn { right:8px; }
  #loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,0.35); font-size:13px; pointer-events:none; }
  #tooltip {
    position:fixed; background:rgba(13,17,23,0.96); border:1px solid rgba(247,162,59,0.35);
    color:#fff; font-family:'Courier New',monospace; font-size:11px;
    padding:8px 10px; border-radius:4px; pointer-events:none; display:none; z-index:100;
    max-width:300px; line-height:1.75;
  }
  #tooltip .tid { color:#f7a23b; word-break:break-all; margin-bottom:2px; }
  #tooltip .row { display:flex; justify-content:space-between; gap:14px; }
  #searchbar {
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    padding:10px 60px;
    background:linear-gradient(to bottom, rgba(13,17,23,0.92) 60%, transparent);
    pointer-events:none;
  }
  #search-form {
    display:flex; align-items:center; gap:0;
    width:100%; max-width:520px;
    pointer-events:all;
  }
  #search-input {
    flex:1; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
    border-right:none; border-radius:4px 0 0 4px;
    color:#fff; font-family:'Courier New',monospace; font-size:13px;
    padding:7px 12px; outline:none;
    transition:border-color .15s;
  }
  #search-input::placeholder { color:rgba(255,255,255,0.3); }
  #search-input:focus { border-color:rgba(247,162,59,0.6); }
  #search-btn {
    background:rgba(247,162,59,0.18); border:1px solid rgba(247,162,59,0.45);
    border-radius:0 4px 4px 0; color:#f7a23b;
    font-size:15px; padding:7px 13px; cursor:pointer;
    display:flex; align-items:center; transition:background .15s;
  }
  #search-btn:hover { background:rgba(247,162,59,0.32); }
  #search-err {
    position:fixed; top:52px; left:50%; transform:translateX(-50%);
    background:rgba(200,50,50,0.85); color:#fff; font-family:'Courier New',monospace;
    font-size:12px; padding:5px 14px; border-radius:4px; z-index:51;
    display:none; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="searchbar">
  <form id="search-form">
    <input id="search-input" type="text" placeholder="block height or hash…" autocomplete="off" spellcheck="false">
    <button id="search-btn" type="submit">⌕</button>
  </form>
</div>
<div id="search-err"></div>

<div id="app">
  <div id="block-wrap">
    <div id="panel">
      <b>Block:</b><br>
      <span id="p-height">—</span><br>
      <span id="p-date">—</span><br>
      <span class="btc">₿</span><br>
      <span id="p-value">—</span><br>
      <span id="p-usd">—</span><br>
      <span id="p-bytes">—</span><br>
      <span id="p-txcount">—</span><br>
      <br>
      avg fee rate<br>
      <span id="p-feerate">—</span><br>
      sats/vbyte
    </div>
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="loading">Loading…</div>
      <button id="close-btn">✕</button>
    </div>
  </div>
</div>
<button id="prev-btn">‹</button>
<button id="next-btn">›</button>
<div id="tooltip"></div>

<script>
const _params = new URLSearchParams(location.search);
const _raw_api_base = _params.get('api_base') || '';
const _raw_mempool_base = _params.get('mempool_base') || 'https://mempool.space';

function _sanitizeUrl(value) {
  if (!value) return null;
  try {
    const url = new URL(value);
    if (url.protocol !== 'http:' && url.protocol !== 'https:') return null;
    return url.origin;
  } catch (_) {
    return null;
  }
}

const API_BASE = _raw_api_base ? (_sanitizeUrl(_raw_api_base) || 'http://localhost:3000') : '';
const MEMPOOL_BASE = _sanitizeUrl(_raw_mempool_base) || 'https://mempool.space';

function buildTxMap(squares, width, usedHeight) {
  const map = [];
  for (const sq of squares) {
    for (let dy = 0; dy < sq.r; dy++) {
      const ry = sq.y + dy;
      if (ry >= usedHeight) continue;
      if (!map[ry]) map[ry] = new Array(width).fill(null);
      for (let dx = 0; dx < sq.r; dx++) {
        map[ry][sq.x + dx] = sq.index;
      }
    }
  }
  return map;
}

function renderFromSquares(squares) {
  if (!ctx || !squares.length) return;
  canvas.width = canvasSize;
  canvas.height = canvasSize;
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvasSize, canvasSize);
  const draw = Math.max(layoutWidth, usedHeight);
  const unitPadding = canvasSize / draw / 4;
  ctx.fillStyle = 'rgb(247,162,59)';
  for (const sq of squares) {
    const px = sq.x * gridSize + unitPadding;
    const py = sq.y * gridSize + offsetY + unitPadding;
    const pw = sq.r * gridSize - unitPadding * 2;
    if (pw <= 0) continue;
    ctx.fillRect(px, py, pw, pw);
  }
}

function getCanvasSize() {
  return Math.min(window.innerWidth - 230, window.innerHeight - 48, 680);
}

function setPanel(block, txCount, encodedBytesLength) {
  document.getElementById('p-height').textContent = block.height.toLocaleString();
  if (block.timestamp) {
    const d = new Date(block.timestamp * 1000);
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('p-date').textContent =
      `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } else {
    document.getElementById('p-date').textContent = '—';
  }
  document.getElementById('p-value').textContent = 'encoded';
  document.getElementById('p-usd').textContent = 'server bitmap';
  document.getElementById('p-bytes').textContent = `${encodedBytesLength.toLocaleString()} bytes`;
  document.getElementById('p-txcount').textContent = `${(block.tx_count || txCount).toLocaleString()} transactions`;
  document.getElementById('p-feerate').textContent = '—';
}

function resizeCanvasState() {
  canvasSize = getCanvasSize();
  const draw = Math.max(layoutWidth, usedHeight);
  gridSize = canvasSize / draw;
  offsetY = (canvasSize - usedHeight * gridSize) / 2;
}

function destroyWorker() {
  if (worker) {
    worker.terminate();
    worker = null;
  }
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

function parseRoute() {
  const m = location.hash.match(/^#\/block\/(?:height\/)?([0-9a-fA-F]+)/);
  return m ? m[1] : null;
}

function navigate(heightOrHash) {
  const isHash = /^[0-9a-fA-F]{64}$/.test(heightOrHash);
  const nextHash = isHash ? `#/block/${heightOrHash}` : `#/block/height/${heightOrHash}`;
  if (location.hash !== nextHash) {
    suppressNextHashChange = true;
    location.hash = nextHash;
  }
}

function updateTitle(height) {
  document.title = `Block ${Number(height).toLocaleString()} — Bitmap Viewer`;
}

async function fetchBlockMeta(height) {
  const response = await fetch(`${API_BASE}/api/block/${height}/meta`);
  if (!response.ok) throw new Error('Block not found');
  return response.json();
}

async function fetchBlockBinary(height) {
  const response = await fetch(`${API_BASE}/api/block/${height}`);
  if (!response.ok) throw new Error('Block not found');
  const hash = response.headers.get('X-Block-Hash');
  const buffer = await response.arrayBuffer();
  return { hash, buffer };
}

async function loadBlock(height) {
  currentHeight = height;
  navigate(height);
  updateTitle(height);
  document.getElementById('search-input').value = '';
  loadingEl.style.display = 'block';
  loadingEl.textContent = 'Loading…';
  canvas.style.display = 'none';
  hideTooltip();
  txMap = null;
  txidsPromise = null;
  currentSquares = [];
  destroyWorker();

  try {
    const [block, binary] = await Promise.all([
      fetchBlockMeta(height),
      fetchBlockBinary(height),
    ]);
    const { hash, buffer } = binary;

    blockData = block;
    currentHash = hash;
    resizeCanvasState();
    setPanel(block, buffer.byteLength, buffer.byteLength);

    worker = new Worker(`${window.location.origin}/worker.js`);
    worker.postMessage({ type: 'layout', buffer, canvasSize }, [buffer]);

    worker.onmessage = e => {
      const { txCount, squares, layoutWidth: width, usedHeight: heightUsed } = e.data;
      currentSquares = squares;
      layoutWidth = width;
      usedHeight = heightUsed;
      resizeCanvasState();
      txMap = buildTxMap(squares, layoutWidth, usedHeight);
      setPanel(block, txCount, buffer.byteLength);
      renderFromSquares(squares);
      loadingEl.style.display = 'none';
      canvas.style.display = 'block';
    };

    worker.onerror = err => {
      loadingEl.textContent = 'Error: layout failed';
      console.error(err);
      destroyWorker();
    };
  } catch (err) {
    loadingEl.textContent = `Error: ${err.message}`;
    console.error(err);
  }
}

async function loadBlockByHash(hash) {
  loadingEl.style.display = 'block';
  loadingEl.textContent = 'Loading…';
  canvas.style.display = 'none';
  hideTooltip();
  try {
    const response = await fetch(`${API_BASE}/api/blockheight/${hash}`);
    if (!response.ok) throw new Error('Block not found');
    const { height } = await response.json();
    currentHash = hash;
    await loadBlock(height);
    location.hash = `#/block/${hash}`;
  } catch (err) {
    loadingEl.textContent = `Error: ${err.message}`;
    throw err;
  }
}

async function loadBlockByInput(raw) {
  const val = raw.trim();
  if (!val) return;
  const errEl = document.getElementById('search-err');
  errEl.style.display = 'none';

  try {
    if (/^\d+$/.test(val)) {
      await loadBlock(parseInt(val, 10));
    } else if (/^[0-9a-fA-F]{64}$/.test(val)) {
      await loadBlockByHash(val);
    } else {
      throw new Error('Enter a block height (number) or 64-char hex hash');
    }
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    setTimeout(() => { errEl.style.display = 'none'; }, 4000);
  }
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const loadingEl = document.getElementById('loading');
const tooltip = document.getElementById('tooltip');

let blockData = null;
let currentHeight = null;
let currentHash = null;
let suppressNextHashChange = false;
let worker = null;
let txMap = null;
let txidsPromise = null;
let currentSquares = [];
let layoutWidth = 1;
let usedHeight = 1;
let canvasSize = 1;
let gridSize = 1;
let offsetY = 0;

canvas.addEventListener('mousemove', async e => {
  if (!txMap) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvasSize / rect.width);
  const my = (e.clientY - rect.top) * (canvasSize / rect.height);
  const gx = Math.floor(mx / gridSize);
  const gy = Math.floor((my - offsetY) / gridSize);
  const row = txMap[gy];
  const txIndex = row ? row[gx] : null;
  if (txIndex === null || txIndex === undefined) {
    hideTooltip();
    return;
  }

  tooltip.style.cssText = `display:block;left:${e.clientX + 14}px;top:${e.clientY - 8}px`;
  tooltip.textContent = '';
  const tidEl = document.createElement('div');
  tidEl.className = 'tid';
  if (!txidsPromise && currentHash) {
    txidsPromise = fetch(`${MEMPOOL_BASE}/api/block/${currentHash}/txids`).then(r => r.json());
  }
  const txids = txidsPromise ? await txidsPromise : null;
  const txid = txids ? txids[txIndex] : null;
  tidEl.textContent = txid
    ? `${txid.slice(0, 20)}…${txid.slice(-8)}`
    : `tx #${txIndex.toLocaleString()}`;
  tooltip.appendChild(tidEl);
});

canvas.addEventListener('mouseleave', hideTooltip);

document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  loadBlockByInput(document.getElementById('search-input').value);
});

window.addEventListener('hashchange', () => {
  if (suppressNextHashChange) {
    suppressNextHashChange = false;
    return;
  }
  const val = parseRoute();
  if (val) loadBlockByInput(val);
});

window.addEventListener('resize', () => {
  resizeCanvasState();
  if (currentSquares.length) renderFromSquares(currentSquares);
});

document.getElementById('close-btn').addEventListener('click', () => {
  canvas.style.display = 'none';
  loadingEl.style.display = 'block';
  loadingEl.textContent = '';
});

document.getElementById('prev-btn').addEventListener('click', () => {
  if (blockData) loadBlock(blockData.height - 1);
});

document.getElementById('next-btn').addEventListener('click', () => {
  if (blockData) loadBlock(blockData.height + 1);
});

const routeVal = parseRoute();
if (routeVal) {
  loadBlockByInput(routeVal);
} else {
  loadBlock(261250);
}
</script>
</body>
</html>
