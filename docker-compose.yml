services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
      tags:
        - ghcr.io/twosatsmaxi/bitmap-render-backend:latest
    image: ghcr.io/twosatsmaxi/bitmap-render-backend:latest
    container_name: bitmap-render-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ORD_BASE_URL: ${ORD_BASE_URL:-http://host.docker.internal:4001}
      PORT: "3000"
      BIND_ADDR: "0.0.0.0"
      MAX_DB_CONNECTIONS: "16"
      MIN_DB_CONNECTIONS: "0"
      CACHE_CAPACITY: "128"
      RUST_LOG: bitmap_render_backend=info,tower_http=info
    restart: unless-stopped
